name: Documentation
on:
  push:
    branches: [main]
    tags: '*'
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  statuses: write
  pull-requests: write
  pages: write
jobs:
  docs:
    uses: lab-sotashimozono/.github/.github/workflows/documentation.yml@main
    with:
      runner: '["self-hosted","rosina"]'
      # target: 'gh-pages' archives the site in the branch — but on the FREE plan a PRIVATE repo's
      # Pages site is built and NOT served (it 404s), so nothing is actually readable from it. Switch
      # to the self-hosted host by setting:
      #     target: 'path'
      #     path-dest: '/srv/docs/<REPO>'
      #     preview-base-url: '<however the box is reached>'   # optional, cosmetic
      target: 'gh-pages'
    secrets: inherit

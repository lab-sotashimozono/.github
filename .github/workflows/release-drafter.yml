name: Release Drafter

# Reusable. Drafts the next release from merged PRs and runs the autolabeler.
#
# The CALLER must keep its workflow `name: Release Drafter` — AutoRegister triggers on
# `workflow_run: workflows: ['Release Drafter']`, i.e. on the caller's *name*. Rename it and
# the whole release chain silently stops firing.
#
# `runner`: private → '["self-hosted","rosina"]' (fleet policy: private CI burns no
# GitHub-hosted minutes), public → '"ubuntu-latest"' (public repos cannot reach the
# private-only rosina pool).
#
# Per-repo config stays per-repo: `.github/release-drafter.yml` (categories, autolabeler).
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: '"ubuntu-latest"'

jobs:
  update_release_draft:
    permissions:
      contents: write        # write the draft release
      pull-requests: write   # autolabeler writes labels back to PRs
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}

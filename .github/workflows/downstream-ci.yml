name: Downstream CI

# Reusable. When a lab package makes a BREAKING version bump on main — for a 0.x package a MINOR bump
# (0.x → 0.(x+1)), for a ≥1.0 package a MAJOR bump — find the lab-sotashimozono repos whose
# Project.toml `[sources]` DIRECTLY depend on it and trigger THEIR CI (workflow_dispatch), so the
# breakage is caught immediately. Internal deps track rev="main" (which CompatHelper cannot see), so
# nothing else does this. DIRECT dependents only (no transitive): dispatching CI.yml does not bump any
# version, so it re-triggers no DownstreamCI — this cannot loop, even on circular deps. Fire-and-forget:
# a failing downstream run surfaces in that repo's own Actions tab + failure notifications.
#
# A manual `workflow_dispatch` on the per-repo caller forces the fan-out (ignoring the version check),
# so the wiring can be tested without a real breaking bump.

on:
  workflow_call:
    secrets:
      BOT_PAT:
        required: true   # cross-repo `gh workflow run` needs a PAT — GITHUB_TOKEN cannot dispatch other repos

jobs:
  downstream:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 to compare the version

      - name: Decide whether to fan out
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "manual dispatch — forcing the downstream fan-out"; exit 0
          fi
          PREV=$(git show HEAD~1:Project.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          CURR=$(grep '^version' Project.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          go=false
          if [ -n "$PREV" ] && [ "$PREV" != "$CURR" ]; then
            IFS=. read -r pM pm _ <<< "$PREV"
            IFS=. read -r cM cm _ <<< "$CURR"
            if   [ "${cM:-0}" -gt "${pM:-0}" ]; then go=true                                             # major bump
            elif [ "$cM" = "$pM" ] && [ "$pM" = "0" ] && [ "${cm:-0}" -gt "${pm:-0}" ]; then go=true      # 0.x minor bump
            fi
          fi
          echo "go=$go" >> "$GITHUB_OUTPUT"
          echo "version: ${PREV:-<none>} -> $CURR  (breaking=$go)"

      - name: Trigger the CI of direct dependents
        if: steps.gate.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          set -uo pipefail
          ME="${{ github.repository }}"; ORG="${ME%%/*}"; NAME="${ME##*/}"
          echo "Fanning out to the direct lab dependents of $ME:"
          n=0
          for r in $(gh repo list "$ORG" --limit 100 --json name,isArchived -q '.[] | select(.isArchived==false) | .name'); do
            [ "$ORG/$r" = "$ME" ] && continue
            pt=$(gh api "repos/$ORG/$r/contents/Project.toml" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)
            printf '%s' "$pt" | grep -qF "$ORG/$NAME" || continue          # not a direct dependent
            if gh workflow run CI.yml --repo "$ORG/$r" --ref main 2>/dev/null; then
              echo "  ✓ dispatched CI: $ORG/$r"; n=$((n+1))
            else
              echo "  ✗ could NOT dispatch CI: $ORG/$r (missing CI.yml / workflow_dispatch?)"
            fi
          done
          echo "::notice::Dispatched $n downstream CI run(s) after a breaking bump of $ME — a failure surfaces in that repo's Actions."

name: CompatHelper

# Reusable CompatHelper. Runs on hosted runners (cheap, isolated) even for private repos.
# Callers schedule it and pass `secrets: inherit`; BOT_PAT is an ORG secret (visibility=all),
# so the opened PR is authored by the PAT and therefore *does* trigger the repo's CI
# (a GITHUB_TOKEN-authored PR would not).
on:
  workflow_call: {}

jobs:
  compathelper:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install CompatHelper
        run: julia -e 'using Pkg; Pkg.add("CompatHelper")'
      - name: Run CompatHelper
        run: julia -e 'using CompatHelper; CompatHelper.main()'
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT || github.token }}

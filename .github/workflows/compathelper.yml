name: CompatHelper

# Reusable CompatHelper — opens `[compat]` bump PRs.
# PR-authoring token precedence (resolved locally in the step; never written to output/env):
#   1. BOT_PAT (org secret) — delivered to PUBLIC repos on Free.
#   2. self-hosted runner's `gh auth token` — the SAME login CI uses to clone private
#      lab-sotashimozono [sources] deps; gives PRIVATE repos a CI-triggering PR author with
#      no repo secret. A PAT-authored PR triggers CI; github.token does not.
#   3. github.token — last resort (PR opens but does NOT trigger CI / auto-merge).
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: '"ubuntu-latest"'
jobs:
  compathelper:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Run CompatHelper
        shell: bash
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          FALLBACK: ${{ github.token }}
        run: |
          cred="$BOT_PAT"
          if [ -z "$cred" ] && command -v gh >/dev/null 2>&1; then
            cred="$(gh auth token 2>/dev/null || true)"
          fi
          [ -z "$cred" ] && cred="$FALLBACK"
          echo "::add-mask::$cred"
          GITHUB_TOKEN="$cred" julia --color=yes -e '
            using Pkg
            Pkg.activate(; temp = true)
            Pkg.add("CompatHelper")
            using CompatHelper
            CompatHelper.main()'

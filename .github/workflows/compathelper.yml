name: CompatHelper

# Reusable CompatHelper. Runs on hosted runners (cheap, isolated) even for
# private repos. Callers schedule it and forward COMPATHELPER_TOKEN so the
# opened PR can itself trigger CI (GITHUB_TOKEN-authored PRs cannot).
on:
  workflow_call:
    secrets:
      COMPATHELPER_TOKEN:
        required: false

jobs:
  compathelper:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install CompatHelper
        run: julia -e 'using Pkg; Pkg.add("CompatHelper")'
      - name: Run CompatHelper
        run: julia -e 'using CompatHelper; CompatHelper.main()'
        env:
          # PAT (COMPATHELPER_TOKEN) so the opened PR triggers CI; falls back to
          # the built-in token (PR then won't trigger downstream CI) if unset.
          GITHUB_TOKEN: ${{ secrets.COMPATHELPER_TOKEN || secrets.GITHUB_TOKEN }}

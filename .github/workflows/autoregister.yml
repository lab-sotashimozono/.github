name: AutoRegister

# Reusable. The per-repo caller is triggered by `workflow_run` after "Release Drafter"
# completes on main. On a Project.toml VERSION BUMP it branches by repo visibility:
#   PUBLIC  → request General registration via a @JuliaRegistrator comment
#             (→ JuliaTagBot → the repo's TagBot → PublishRelease).
#   PRIVATE → tag vX.Y.Z AND publish the GitHub Release, both HERE, in one step.
# Runs on ubuntu-latest: lightweight (git + gh), and public repos cannot use the private
# rosina pool anyway.
#
# Why private does the release itself (does NOT delegate to PublishRelease): an Action-pushed
# tag does not reliably trigger the repo's PublishRelease — a GITHUB_TOKEN-pushed tag triggers
# nothing, GitHub suppresses the push event when >3 tags are pushed at once, and PublishRelease
# runs only on the (sometimes-unavailable) rosina pool. That fragility left a whole run of tags
# (v0.4.11+) created but their releases stuck as unpublished drafts. Publishing here — on
# ubuntu-latest, idempotently, even when the tag already exists — removes every one of those
# dependencies. If the tag push happens to also trigger PublishRelease, that just re-edits an
# already-published release (harmless).
on:
  workflow_call:
    secrets:
      # BOT_PAT (org secret) must be DECLARED so it reliably reaches this reusable
      # workflow from a `workflow_run`-triggered caller — `secrets: inherit` alone was
      # dropping it, so the tag got pushed with GITHUB_TOKEN and did NOT trigger
      # PublishRelease. Declaring it makes the contract explicit. `required: false` so a
      # repo without BOT_PAT still falls back to github.token (public/@JuliaRegistrator path).
      BOT_PAT:
        required: false

jobs:
  autoregister:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      # Must NOT exceed what the per-repo callers grant (contents+issues) — a reusable workflow
      # requesting a permission the caller omits fails to START ("workflow file issue"). Do NOT add
      # `pull-requests: read` here: build_release_notes.py's `gh pr list` runs with GH_TOKEN=BOT_PAT
      # (a PAT that already carries PR read); without BOT_PAT it degrades gracefully to auto-notes.
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          token: ${{ secrets.BOT_PAT || github.token }}

      - name: Detect version bump
        id: v
        run: |
          PREV=$(git show HEAD~1:Project.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          CURR=$(grep '^version' Project.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "curr=$CURR" >> "$GITHUB_OUTPUT"
          if [ "$PREV" != "$CURR" ] && [ -n "$CURR" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version: $PREV -> $CURR"

      - name: Public → request General registration (@JuliaRegistrator)
        if: steps.v.outputs.changed == 'true' && github.event.repository.private == false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(printf '@JuliaRegistrator register\n\n## Changelog\n\nRelease v%s.' "${{ steps.v.outputs.curr }}")
          gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/comments" \
            -f body="$BODY"
          echo "Requested General registration for v${{ steps.v.outputs.curr }}"

      - name: Private → tag + publish GitHub Release (no registry)
        if: steps.v.outputs.changed == 'true' && github.event.repository.private == true
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT || github.token }}
        run: |
          set -eo pipefail
          TAG="v${{ steps.v.outputs.curr }}"

          # 1) tag (idempotent) — but do NOT stop if it already exists; still (re)publish below.
          if ! git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG" "${{ github.event.workflow_run.head_sha }}"
            git push origin "$TAG"
            echo "Pushed tag $TAG"
          else
            echo "Tag $TAG already exists — proceeding to (re)publish its release"
          fi

          # 2) Build release notes, guaranteeing they are never empty.
          #    Prefer the repo's rich notes script. It lists PRs via the SEARCH API, which the
          #    ephemeral GITHUB_TOKEN cannot use on a PRIVATE repo — and on the Free plan the org
          #    BOT_PAT is NOT delivered to private repos, so `secrets.BOT_PAT` is empty here. The
          #    script then emits "No merged pull requests" (exit 0), which previously got published
          #    as-is. So: use the rich notes only when they are non-empty AND not that placeholder;
          #    otherwise fall back to GitHub's server-side generated notes. Those are composed
          #    server-side from the merged PRs, so they work with GITHUB_TOKEN's contents:write and
          #    need neither a PAT nor the (token-gated, eventually-consistent) search index.
          NOTES_FILE=/tmp/release-notes.md
          have_notes=false
          if [ -f .github/scripts/build_release_notes.py ] \
             && python3 .github/scripts/build_release_notes.py --tag "$TAG" >"$NOTES_FILE" 2>/tmp/notes.err \
             && [ -s "$NOTES_FILE" ] \
             && ! grep -q "No merged pull requests" "$NOTES_FILE"; then
            have_notes=true
            echo "Using rich notes from build_release_notes.py"
          elif gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
                 -f tag_name="$TAG" --jq '.body' >"$NOTES_FILE" 2>/tmp/notes.err \
               && [ -s "$NOTES_FILE" ]; then
            have_notes=true
            echo "Using GitHub server-side generated notes"
          else
            echo "Could not build release notes: $(cat /tmp/notes.err 2>/dev/null)"
          fi

          # 3) publish: overwrite the Release Drafter draft if one exists, else create.
          NOTES_ARGS=()
          if [ "$have_notes" = true ]; then NOTES_ARGS=(--notes-file "$NOTES_FILE"); fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --draft=false "${NOTES_ARGS[@]}"
          elif [ ${#NOTES_ARGS[@]} -gt 0 ]; then
            gh release create "$TAG" --title "$TAG" "${NOTES_ARGS[@]}"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          echo "Published release $TAG"
